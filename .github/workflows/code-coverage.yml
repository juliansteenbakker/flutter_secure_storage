name: 📊 Code Coverage

on: [push, pull_request]

env:
  PUB_ENVIRONMENT: bot.github

jobs:
  test_with_coverage:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: flutter_secure_storage

    steps:
      # Checkout the Repository
      - name: 📥 Checkout Repository
        uses: actions/checkout@v6

      # Setup Flutter SDK with Cache
      - name: ⚡ Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Cache Pub Dependencies
      - name: 📦 Cache Pub Dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            flutter_secure_storage/.dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # Install Project Dependencies
      - name: 🚀 Install Dependencies
        run: flutter pub get

      # Run Tests with Code Coverage
      - name: ✅ Run Unit Tests with Coverage
        run: flutter test --coverage

      # Upload Coverage Report as Artifact
      - name: 📊 Upload Coverage Report
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage/lcov.info

      # Upload Coverage to Codecov
      - name: ☁️ Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          flags: flutter
          name: codecov-flutter
          fail_ci_if_error: true

  test_android_coverage:
    name: 🤖 Android Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v6

      - name: ☕ Set Up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: ⚡ Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Build the example app first — required by the Flutter docs to generate
      # platform-specific build files before running native unit tests.
      - name: 🏗️ Build Example App (generates native build files)
        working-directory: flutter_secure_storage/example
        run: flutter build apk --debug

      - name: 🧪 Run Android Unit Tests with Coverage
        working-directory: flutter_secure_storage/example/android
        run: ./gradlew :flutter_secure_storage:jacocoTestReport

      - name: ☁️ Upload Android Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: flutter_secure_storage/android/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          flags: android
          name: codecov-android
          fail_ci_if_error: true
