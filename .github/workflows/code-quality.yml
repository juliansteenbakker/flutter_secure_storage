name: 📝 Code Quality

on: [push, pull_request]

defaults:
  run:
    shell: bash

env:
  PUB_ENVIRONMENT: bot.github

jobs:
  init:
    name: 🏗️ Initialization (Shared Melos Bootstrap)
    runs-on: ubuntu-latest

    outputs:
      pub-cache-key: ${{ steps.cache-pub.outputs.cache-primary-key }}
      melos-path: ${{ steps.melos-path.outputs.path }}

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚡ Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 🔍 Flutter Version Info
        run: flutter doctor -v

      - name: 📦 Cache Pub Dependencies
        id: cache-pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: 🚀 Install Melos
        run: |
          flutter pub global activate melos
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: 🔧 Bootstrap Workspace with Melos
        run: melos bootstrap

      - name: 📍 Export Melos Path
        id: melos-path
        run: echo "path=$HOME/.pub-cache/bin" >> "$GITHUB_OUTPUT"

  analysis:
    name: 🔍 Analysis
    runs-on: ubuntu-latest
    needs: init

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚡ Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 🔗 Rehydrate Melos Path
        run: echo "${{ needs.init.outputs.melos-path }}" >> $GITHUB_PATH

      - name: 🔧 Restore Workspace State
        run: melos bootstrap

      - name: ✅ Lint Code
        run: melos analyze

  formatting:
    name: 🎨 Formatting
    runs-on: ubuntu-latest
    needs: init

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚡ Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 🔗 Rehydrate Melos Path
        run: echo "${{ needs.init.outputs.melos-path }}" >> $GITHUB_PATH

      - name: 🔧 Restore Workspace State
        run: melos bootstrap

      - name: 🎯 Check Code Formatting
        run: melos format --output none --set-exit-if-changed
