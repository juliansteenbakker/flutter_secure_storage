name: 📝 Code Quality

on: [push, pull_request]

defaults:
  run:
    shell: bash

env:
  PUB_ENVIRONMENT: bot.github
  PUB_GLOBAL_BIN: $HOME/.pub-cache/bin

jobs:
  analysis:
    name: 🔍 Analysis
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚡ Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 📦 Cache Pub Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: 🚀 Install Melos
        run: |
          flutter pub global activate melos
          echo "${PUB_GLOBAL_BIN}" >> $GITHUB_PATH

      - name: 🔧 Bootstrap Workspace
        run: melos bootstrap

      - name: ✅ Lint Code
        run: melos analyze

  formatting:
    name: 🎨 Formatting
    runs-on: ubuntu-latest
    needs: analysis

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚡ Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 🚀 Expose Pub Global Bin
        run: echo "${PUB_GLOBAL_BIN}" >> $GITHUB_PATH

      - name: 🔧 Bootstrap Workspace
        run: melos bootstrap

      - name: 🎯 Check Formatting
        run: melos format --output none --set-exit-if-changed
